textarea{

.field-card.active{

.field-grid{

.full{

}

.date-preview{

  border-radius:8px;

  font-family:inherit;
  font-weight:700;
}

button:hover{

button.secondary{

button.secondary:hover{

.status{

  margin-top:12px;

  font-size:1rem;

.output-wrap{

.note-card{

function formatDate(date) {
  return String(date.getMonth() + 1).padStart(2, "0") +
    "/" +
    String(date.getDate()).padStart(2, "0") +
    "/" +
    date.getFullYear();
}

function formatInputDate(value) {
  if (!value) {
    return "";
  }

  const parts = value.split("-");

  if (parts.length !== 3) {
    return value;
  }

  return parts[1] + "/" + parts[2] + "/" + parts[0];
}

function addMonthsClamped(date, months) {
  const day = date.getDate();

  const result = new Date(
    date.getFullYear(),
    date.getMonth() + months,
    1
  );

  const lastDay = new Date(
    result.getFullYear(),
    result.getMonth() + 1,
    0
  ).getDate();

  result.setDate(
    Math.min(day, lastDay)
  );

  return result;
}

function approvalRange(duration) {
  const now = new Date();

  const start = new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate()
  );

  let months = 0;

  if (duration === "3 months") {
    months = 3;
  }

  if (duration === "6 months") {
    months = 6;
  }

  if (duration === "1 year") {
    months = 12;
  }

  if (!months) {
    return "";
  }

  return formatDate(start) +
    "-" +
    formatDate(
      addMonthsClamped(start, months)
    );
}

    reason.appendChild(option);
  });
}

function loadSituations(savedSituation) {
  const reasonValue =

    '<option value="">-- select situation --</option>';

  clearFields();
  clearOutputs();

  if (!reasonValue) {
    situationWrap.classList.add("hidden");
    saveState();
    return;
  }

  situationWrap.classList.remove("hidden");

  Object.keys(data[reasonValue]).forEach(function(name) {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    situation.appendChild(option);
  });

  if (savedSituation) {
    situation.value = savedSituation;
  }

  saveState();
}

function makeField(key, value) {
  const field = fields[key];
  const safeValue = value || "";

  if (!field) {
    return "";
  }

  if (field.type === "select") {
    let options =
      '<option value="">-- select --</option>';

    field.options.forEach(function(optionValue) {
      const selected =
        safeValue === optionValue
          ? " selected"
          : "";

      options +=
        '<option value="' +
        escapeAttr(optionValue) +
        '"' +
        selected +
        ">" +
        escapeHTML(optionValue) +
        "</option>";
    });

    let html =
      '<div>' +
      '<label for="' +
      key +
      '">' +
      field.label +
      "</label>" +
      '<select id="' +
      key +
      '" class="dynamic-field">' +
      options +
      "</select>" +
      "</div>";

    if (key === "duration") {
      html +=
        '<div id="datePreview" class="date-preview">' +
        (
          safeValue
            ? approvalRange(safeValue)
            : "select an approval length"
        ) +
        "</div>";
    }

    return html;
  }

  if (field.type === "textarea") {
    return (
      '<div class="full">' +
      '<label for="' +
      key +
      '">' +
      field.label +
      "</label>" +
      '<textarea id="' +
      key +
      '" class="dynamic-field">' +
      escapeHTML(safeValue) +
      "</textarea>" +
      "</div>"
    );
  }

  return (
    '<div>' +
    '<label for="' +
    key +
    '">' +
    field.label +
    "</label>" +
    '<input id="' +
    key +
    '" class="dynamic-field" type="' +
    field.type +
    '" value="' +
    escapeAttr(safeValue) +
    '">' +
    "</div>"
  );
}

function renderFields(savedValues) {
  const reasonValue =
    document.getElementById("reason").value;

  const situationValue =
    document.getElementById("situation").value;

  const fieldsArea =
    document.getElementById("fieldsArea");

  clearOutputs();

  if (!reasonValue || !situationValue) {
    clearFields();
    saveState();
    return;
  }

  const config =
    data[reasonValue][situationValue];

  const neededFields =
    config.fields || [];

  if (!neededFields.length) {
    clearFields();
    saveState();
    return;
  }

  fieldsArea.classList.add("active");

  fieldsArea.innerHTML =
    '<div class="field-grid">' +
    neededFields
      .map(function(key) {
        return makeField(
          key,
          savedValues && savedValues[key]
            ? savedValues[key]
            : ""
        );
      })
      .join("") +
    "</div>";

  document
    .querySelectorAll(".dynamic-field")
    .forEach(function(el) {
      el.addEventListener("input", handleDynamicChange);
      el.addEventListener("change", handleDynamicChange);
    });

  updateDatePreview();
  saveState();
}

function clearFields() {
  const fieldsArea =
    document.getElementById("fieldsArea");

  fieldsArea.innerHTML = "";
  fieldsArea.classList.remove("active");
}

function handleDynamicChange() {
  updateDatePreview();
  clearOutputs();
  saveState();
}

function updateDatePreview() {
  const duration =
    document.getElementById("duration");

  const preview =
    document.getElementById("datePreview");

  if (!duration || !preview) {
    return;
  }

  preview.textContent =
    approvalRange(duration.value) ||
    "select an approval length";
}

function getDynamicValues() {
  const values = {};

  document
    .querySelectorAll(".dynamic-field")
    .forEach(function(el) {
      values[el.id] = el.value;
    });

  return values;
}

function fillTemplate(template, values) {
  return template
    .replace(
      /\{\{?\s*([a-zA-Z0-9_]+)\s*\}?\}/g,
      function(match, key) {
        key = key.trim();

        if (key === "approvalRange") {
          return approvalRange(values.duration);
        }

        if (
          fields[key] &&
          fields[key].type === "date"
        ) {
          return formatInputDate(values[key]);
        }

        return values[key] || "";
      }
    )
    .replace(/\s+/g, " ")
    .trim();
}

function createNotes() {
  const reasonValue =
    document.getElementById("reason").value;

  const situationValue =
    document.getElementById("situation").value;

  if (!reasonValue || !situationValue) {
    showStatus("please select a reason and situation.");
    return;
  }

  const config =
    data[reasonValue][situationValue];

  const values =
    getDynamicValues();

  const missing =
    (config.fields || []).filter(function(key) {
      return !values[key];
    });

  if (missing.length) {
    showStatus("please complete all required fields.");
    return;
  }

  let notes = [];

  if (config.custom === "mtat") {
    const range =
      approvalRange(values.duration);

    const base =
      values.caseNumber +
      " denial was overturned due to mtat. " +
      values.drugStrength +
      " was approved";

    notes.push({
      title: "core note",
      text:
        base +
        " effective " +
        range +
        ". prime clinical review 1-866-202-3474."
    });

    const upToQl =
      ["pa/ql", "st/ql", "ce/ql"].includes(values.reviewType)
        ? " up to ql"
        : "";

    notes.push({
      title: "rxclaim note",
      text:
        base +
        upToQl +
        " effective " +
        range +
        ". prime clinical review 1-866-202-3474."
    });
  } else if (config.custom === "transfer") {
    notes.push({
      title: "note",
      text:
        "transferred pa from " +
        values.accountType +
        " per case " +
        values.paNumber +
        "."
    });
  } else {
    notes =
      (config.notes || []).map(function(note) {
        return {
          title: note.title,
          text: fillTemplate(note.template, values)
        };
      });
  }

  renderOutputs(notes);
  saveState();
  showStatus("created");
}

function renderOutputs(notes) {
  const outputs =
    document.getElementById("outputs");

  outputs.innerHTML = "";
  outputs.style.display = "block";

  notes.forEach(function(note, index) {
    const card =
      document.createElement("div");

    card.className = "note-card";

    const title =
      document.createElement("h3");

    title.textContent = note.title;

    const textarea =
      document.createElement("textarea");

    textarea.id = "note" + index;
    textarea.className = "generated-note";
    textarea.dataset.title = note.title;
    textarea.readOnly = true;
    textarea.value = note.text;

    textarea.onclick = function() {
      textarea.select();
    };

    const buttonWrap =
      document.createElement("div");

    buttonWrap.className = "buttons";

    const button =
      document.createElement("button");

    button.textContent = "copy";

    button.onclick = function() {
      copyNote(textarea.id);
    };

    buttonWrap.appendChild(button);
    card.appendChild(title);
    card.appendChild(textarea);
    card.appendChild(buttonWrap);
    outputs.appendChild(card);
  });
}

function clearOutputs() {
  const outputs =
    document.getElementById("outputs");

  outputs.innerHTML = "";
  outputs.style.display = "none";
}

async function copyNote(id) {
  const textarea =
    document.getElementById(id);

  if (!textarea) {
    return;
  }

  try {
    await navigator.clipboard.writeText(textarea.value);
  } catch (error) {
    textarea.select();
    document.execCommand("copy");
  }

  showStatus("copied");
}

function saveState() {
  const notes = [];

  document
    .querySelectorAll(".generated-note")
    .forEach(function(area) {
      notes.push({
        title: area.dataset.title,
        text: area.value
      });
    });

  const state = {
    reason:
      document.getElementById("reason").value,

    situation:
      document.getElementById("situation").value,

    values:
      getDynamicValues(),

    notes:
      notes
  };

  localStorage.setItem(
    storageKey,
    JSON.stringify(state)
  );
}

function restoreState() {
  const state =
    JSON.parse(
      localStorage.getItem(storageKey) || "null"
    );

  if (!state) {
    return;
  }

  document.getElementById("reason").value =
    state.reason || "";

  loadSituations(state.situation || "");
  renderFields(state.values || {});

  if (state.notes && state.notes.length) {
    renderOutputs(state.notes);
  }
}

function resetAll() {
  localStorage.removeItem(storageKey);

  document.getElementById("reason").value = "";

  document.getElementById("situation").innerHTML =
    '<option value="">-- select situation --</option>';

  document
    .getElementById("situationWrap")
    .classList
    .add("hidden");

  clearFields();
  clearOutputs();

  showStatus("reset");
}

function showStatus(message) {
  const status =
    document.getElementById("statusMessage");

  status.textContent = message;

  setTimeout(function() {
    status.textContent = "";
  }, 2500);
}

function escapeHTML(value) {
  const div =
    document.createElement("div");

  div.textContent = value || "";

  return div.innerHTML;
}

function escapeAttr(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

document.addEventListener("DOMContentLoaded", function() {
  initReasons();

  document
    .getElementById("reason")
    .addEventListener("change", function() {
      loadSituations("");
    });

  document
    .getElementById("situation")
    .addEventListener("change", function() {
      renderFields({});
    });

  restoreState();
});
</script>

</body>
</html>
